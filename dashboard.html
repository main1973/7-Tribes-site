<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>7TRB Dashboard</title>

<link rel="icon" href="images/logo.png" />

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#FFD700;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:#aaa;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:50px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.connect{
  background:linear-gradient(90deg,#FFD700,#C9A227);
  color:#000;
}

.card{
  background:#111;
  border:1px solid #333;
  border-radius:20px;
  padding:20px;
  margin-top:15px;
}

.label{
  color:#aaa;
  font-size:12px;
  letter-spacing:1px;
}

.value{
  font-size:24px;
  margin-top:5px;
}

.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  margin-top:10px;
}

.bar-fill{
  height:100%;
  width:60%;
  background:#FFD700;
  border-radius:10px;
}

#map{
  height:300px;
  border-radius:15px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="systemBanner" style="text-align:center;padding:10px;background:#111;color:#FFD700;">
  Wallet connection available inside AmVault
</div>

<div class="container">

<h1>7TRB Dashboard</h1>
<div class="sub">Transparency • Circulation • Growth</div>

<button class="connect" id="connectBtn">Connect Wallet</button>

<!-- WALLET -->
<div class="card">
  <div class="label">Wallet</div>
  <div class="value" id="walletBalance">Not Connected</div>
  <div class="value" id="tokenBalance">7TRB Balance: —</div>
</div>

<!-- TREASURY -->
<div class="card">
  <div class="label">Treasury</div>
  <div class="value" id="treasury">—</div>
  <div class="bar"><div id="treasuryBar" class="bar-fill"></div></div>
</div>

<!-- HOLDERS -->
<div class="card">
  <div class="label">Community Holders</div>
  <div class="value" id="holders">—</div>
</div>

<!-- ACTIVE -->
<div class="card">
  <div class="label">Active Participants (30d)</div>
  <div class="value" id="active">—</div>
</div>

<!-- REFERRALS -->
<div class="card">
  <div class="label">Referrals (30d)</div>
  <div class="value" id="referrals">—</div>
</div>

<!-- CHART -->
<div class="card">
  <div class="label">Treasury / Supply View</div>
  <canvas id="treasuryChart"></canvas>
</div>

<!-- MERCHANT MAP -->
<div class="card">
  <div class="label">Merchant Map</div>
  <div id="map"></div>
</div>

<!-- MERCHANT LIST -->
<div class="card">
  <div class="label">Merchant Directory</div>
  <div id="merchants">Loading...</div>
</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
