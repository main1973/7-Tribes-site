<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>7TRB Dashboard — Live System</title>

<link rel="icon" href="images/logo.png" />

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.1/dist/ethers.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --bg:#0b0b0c;
  --card:#121214;
  --text:#eaeaea;
  --muted:#a1a1a6;
  --accent:#FFD700;
  --border:#222;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
}
.wrap{max-width:1100px;margin:auto;padding:20px;}

header{
  background:#111;
  border-bottom:1px solid var(--border);
}
h1{margin:0;color:#FFD700}

.cards{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:15px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:15px;
}

.label{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
}

.value{
  font-size:26px;
  font-weight:700;
}

.bar{
  height:10px;
  background:#1a1a1d;
  border-radius:999px;
  margin-top:8px;
}

.bar i{
  display:block;
  height:100%;
  background:#FFD700;
  width:0%;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:15px;
}

#map{
  height:300px;
  border-radius:12px;
}

button{
  background:linear-gradient(90deg,#FFD700,#b8912f);
  color:#111;
  border:none;
  padding:10px 20px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="wrap" style="display:flex;justify-content:space-between;align-items:center;">
    <h1>7TRB Dashboard</h1>
    <button id="connectBtn">Connect Wallet</button>
  </div>
</header>

<div class="wrap">

<p style="color:#aaa;">Transparency • Circulation • Growth</p>

<div id="walletBalance" style="color:#FFD700;font-weight:600;"></div>

<!-- KPI -->
<section class="cards">
  <div class="card">
    <div class="label">Community Holders</div>
    <div class="value" id="holders">—</div>
  </div>

  <div class="card">
    <div class="label">Active Participants</div>
    <div class="value" id="active">—</div>
  </div>

  <div class="card">
    <div class="label">Treasury</div>
    <div class="value" id="treasury">—</div>
    <div class="bar"><i id="treasuryBar"></i></div>
  </div>

  <div class="card">
    <div class="label">Referrals</div>
    <div class="value" id="referrals">—</div>
  </div>

  <div class="card">
    <div class="label">Your 7TRB</div>
    <div class="value" id="tokenBalance">—</div>
  </div>
</section>

<!-- CHART + PROJECTS -->
<div class="grid">
  <div class="card">
    <div class="label">Treasury Trend</div>
    <canvas id="treasuryChart"></canvas>
  </div>

  <div class="card">
    <div class="label">Merchant Directory</div>
    <div id="merchants">Loading...</div>
  </div>
</div>

<!-- MAP -->
<div class="card" style="margin-top:15px;">
  <div class="label">Merchant Map</div>
  <div id="map"></div>
</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
