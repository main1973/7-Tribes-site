<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3ENCBC9RT3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3ENCBC9RT3');
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>7TRB Dashboard — Live System</title>
  <link rel="icon" href="images/logo.png" />

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.1/dist/ethers.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0b0c;
      color:#fff;
    }

    .wrap { max-width:1100px; margin:auto; padding:20px; }

    header {
      background:#111;
      border-bottom:1px solid #222;
      position:sticky;
      top:0;
      z-index:100;
    }

    .header-inner {
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand img {
      width:40px;
      border-radius:50%;
    }

    h1 {
      font-size:18px;
      margin:0;
    }

    #networkDot, #walletDot {
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
      background:red;
      margin-left:6px;
    }

    .btn {
      padding:10px 16px;
      border-radius:20px;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .gold {
      background:linear-gradient(90deg,#FFD700,#b8912f);
      color:#111;
    }

    .ghost {
      background:transparent;
      border:1px solid #333;
      color:#fff;
    }

    .panel, .card {
      background:#121214;
      border:1px solid #222;
      border-radius:12px;
      padding:14px;
      margin-top:12px;
    }

    .cards {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
    }

    .value {
      font-size:24px;
      font-weight:bold;
    }

    #map { height:300px; }

    table {
      width:100%;
      border-collapse:collapse;
    }

    td, th {
      padding:8px;
      border-bottom:1px solid #222;
    }

    @media(max-width:900px){
      .cards{grid-template-columns:repeat(2,1fr);}
    }

    @media(max-width:600px){
      .cards{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>

<header>
  <div class="wrap header-inner">
    <div class="brand">
      <img src="images/logo.png">
      <h1>
        7TRB Dashboard
        <span id="networkDot"></span>
        <span id="walletDot"></span>
      </h1>
    </div>

    <div>
      <button id="connectBtn" class="btn gold">Connect Wallet</button>
      <a href="index.html" class="btn ghost">Home</a>
    </div>
  </div>
</header>

<div class="wrap">

  <p>Updated <span id="updatedAt"></span></p>

  <div id="walletBalance"></div>
  <div id="treasuryBalance"></div>

  <!-- Contracts -->
  <div class="panel">
    <b>Treasury Wallet:</b><br>
    <span id="treasuryAddress">0x26B0cA2C767758Fc3E34e0481065a55521E42BaB</span><br><br>

    <b>Token Contract:</b><br>
    <span id="tokenContract">0x991DF36e5b0BB596A83dEe6A840F78bAa40450e0</span>
  </div>

  <!-- DEX -->
  <div class="panel">
    <b>DEX: JollofSwap</b><br><br>

    <button class="btn gold" onclick="openDex()">Open JollofSwap</button>

    <p style="color:#aaa;margin-top:8px;">
      Trade and liquidity access powered by JollofSwap
    </p>
  </div>

  <!-- KPI -->
  <div class="cards">
    <div class="card"><div>Holders</div><div id="holders" class="value"></div></div>
    <div class="card"><div>Active</div><div id="active" class="value"></div></div>
    <div class="card"><div>Treasury</div><div id="treasury" class="value"></div></div>
    <div class="card"><div>Spend</div><div id="spendSave" class="value"></div></div>
    <div class="card"><div>Referrals</div><div id="referrals" class="value"></div></div>
  </div>

  <!-- Chart -->
  <div class="panel">
    <canvas id="treasuryChart"></canvas>
  </div>

  <!-- Map + Merchants -->
  <div class="panel">
    <div id="map"></div>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>City</th>
          <th>Volume</th>
        </tr>
      </thead>
      <tbody id="merchRows"></tbody>
    </table>
  </div>

</div>

<script>
  function openDex(){
    window.open("https://jollofswap.com","_blank");
  }
</script>

<script src="dashboard.js"></script>

</body>
</html>
